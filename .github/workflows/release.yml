name: Release

on:
  push:
    tags: ["v*"]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/kwork-mcp
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv build
      - name: Smoke test
        run: |
          WHEEL=$(ls dist/*.whl)
          uv run --isolated --no-project --with "$WHEEL" -- python -c "from kwork_mcp.server import create_server; s = create_server(); print('OK')"
      - run: uv publish
      - name: Create GitHub release
        run: |
          TAG="${{ github.ref_name }}"
          PRERELEASE_FLAG=""
          if echo "$TAG" | grep -qE '(a|b|rc|dev)[0-9]'; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG" dist/* --generate-notes $PRERELEASE_FLAG
        env:
          GH_TOKEN: ${{ github.token }}
